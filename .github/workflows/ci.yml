name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.11'
      - name: Create environment
        run: make venv
      - name: Format check
        run: make format-check
      - name: Lint
        run: make lint
      - name: Type check
        run: make typecheck
      - name: Test
        run: make tests
